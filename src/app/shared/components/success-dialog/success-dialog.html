<div class="overlay"></div>

<div class="dialog">

  <div class="header">
    <div class="brand">
      <img [src]="config.clinic.logo" alt="Clinic Logo" (error)="onLogoError($event)" />
      <div class="brand-info">
        <h2>{{ config.clinic.name }}</h2>
        <p>Patient Registered</p>
      </div>
    </div>
    <button class="close" (click)="onClose()">✕</button>
  </div>

  <div class="status-pill">Invoice generated successfully</div>

  <div class="body">

    <div class="summary-card">
      <div class="summary-row">
        <span>Patient</span>
        <strong>{{patient?.name}}</strong>
      </div>
      <div class="summary-row">
        <span>Mobile</span>
        <strong>{{patient?.mobile}}</strong>
      </div>
      <div class="summary-row">
        <span>Invoice</span>
        <strong>{{patient?.invoiceNumber}}</strong>
      </div>
      <div class="summary-row">
        <span>Date</span>
        <strong>{{patient?.date | date:'dd MMM yyyy'}}</strong>
      </div>
      <div class="summary-row">
        <span>Payment</span>
        <strong>{{patient?.paymentMode || 'N/A'}}</strong>
      </div>

      <div class="amount-block">
        <div>
          <span>Total Amount</span>
          <strong>₹{{patient?.total}}</strong>
        </div>
      </div>
    </div>

    <div class="actions actions-grid-4">
      <button (click)="handlePreview()">🔍 Preview</button>
      <button (click)="handlePrint()">🖨 Print</button>
      <button (click)="handlePdf()">📄 Download</button>
      <button class="whatsapp-button" (click)="handleWhatsapp()">📱 WhatsApp</button>
    </div>

  </div>

</div>
