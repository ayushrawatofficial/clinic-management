<div class="header">

  <div class="left">
    <h3>Clinic Dashboard</h3>
  </div>

  <div class="right">

    <div class="user-info">
      {{userName}} ({{role}})
    </div>

    <div class="datetime">
      <span class="time">{{time}}</span>
      <span class="date">{{date}}</span>
    </div>

    <div class="logout" (click)="logout()">
      Logout
    </div>

  </div>

</div>
