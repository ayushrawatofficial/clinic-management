<div class="header">

  <!-- LEFT: toggle + divider + clinic name -->
  <div class="left">
    <button class="toggle-btn" (click)="toggle.emit()">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
        <rect x="2" y="3.5"  width="12" height="1.5" rx="0.75" fill="currentColor"/>
        <rect x="2" y="7.25" width="8"  height="1.5" rx="0.75" fill="currentColor"/>
        <rect x="2" y="11"   width="12" height="1.5" rx="0.75" fill="currentColor"/>
      </svg>
    </button>

    <div class="divider"></div>

    <img
      [src]="config.clinic.logo"
      class="logo"
      [class.collapsed]="collapsed"
      alt="Clinic Logo"
    />

    <div class="clinic-info">
      <span class="clinic-name">{{ config.clinic.name }}</span>
      <span class="clinic-sub">Admin Management Portal</span>
    </div>
  </div>

  <!-- RIGHT: clock, user pill, logout -->
  <div class="right">

    <div class="datetime">
      <span class="time">{{ time }}</span>
      <span class="date">{{ date }}</span>
    </div>

    <div class="divider"></div>

    <div class="user-pill">
      <div class="user-avatar">{{ initials }}</div>
      <div class="user-meta">
        <span class="user-name">{{ userName }}</span>
        <span class="user-role">{{ role }}</span>
      </div>
    </div>

    <button class="logout-btn" (click)="logout()">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
        <path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3M10 11l3-3-3-3M13 8H6"
              stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Logout
    </button>

  </div>
</div>
