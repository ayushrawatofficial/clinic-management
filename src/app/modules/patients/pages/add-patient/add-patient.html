<div class="overlay"></div>

<div class="dialog">

  <div class="header">
    <h3>Add Patient</h3>
    <span (click)="close()">✕</span>
  </div>

  <div class="body grid">

    <!-- MOBILE -->
    <div class="field">
      <label>Mobile *</label>
      <input [(ngModel)]="mobile" (ngModelChange)="onMobileChange()" />
    </div>

    <!-- NAME -->
    <div class="field">
      <label>Name *</label>
      <input [(ngModel)]="name" />
    </div>

    <!-- AGE -->
    <div class="field">
      <label>Age *</label>
      <input [ngModel]="age" (ngModelChange)="onAgeChange($event)" />
    </div>

    <!-- GENDER -->
    <div class="field">
      <label>Gender</label>
      <select [(ngModel)]="gender">
        <option>Male</option>
        <option>Female</option>
      </select>
    </div>

    <!-- SERVICES -->
    <div class="field half">
      <label>Services</label>

      <div class="multiselect" (click)="openServiceDropdown($event)">
        <input
          placeholder="Search services..."
          [(ngModel)]="serviceSearch"
          (input)="filterServices(); $event.stopPropagation()" />

        <div class="options" *ngIf="activeDropdown === 'service'">

          <div class="option"
               *ngFor="let s of filteredServices"
               (click)="toggleService(s); $event.stopPropagation()"
               [class.selected]="isSelected(s)">

            <input type="checkbox"
                   [checked]="isSelected(s)"
                   (click)="$event.stopPropagation()" />

            <span>{{s.name}}</span>
            <b>₹{{s.price || s.finalPrice}}</b>

          </div>

        </div>
      </div>

      <!-- SELECTED -->
      <div class="selected-list">
        <div class="chip" *ngFor="let s of selectedServices">
          {{s.name}}
          <span class="price">₹{{s.price || s.finalPrice}}</span>
          <i (click)="remove(s)">✕</i>
        </div>
      </div>
    </div>

    <!-- PRODUCTS -->
    <div class="field half">
      <label>Products</label>

      <div class="multiselect" (click)="openProductDropdown($event)">
        <input
          placeholder="Search products..."
          [(ngModel)]="productSearch"
          (input)="filterProducts(); $event.stopPropagation()" />

        <div class="options" *ngIf="activeDropdown === 'product'">

          <div class="option"
               *ngFor="let p of filteredProducts"
               [class.disabled]="p.stock === 0"
               [class.selected]="isProductSelected(p)"
               (click)="p.stock === 0 ? null : addProduct(p); $event.stopPropagation()">

            <input type="checkbox"
                   [checked]="isProductSelected(p)"
                   [disabled]="p.stock === 0"
                   (click)="$event.stopPropagation()" />

            <span>{{p.name}}</span>

            <div class="right">
              <b>₹{{p.price}}</b>
              <small>{{p.stock === 0 ? 'Out' : 'Stock: ' + p.stock}}</small>
            </div>

          </div>

        </div>
      </div>

      <!-- SELECTED -->
      <div class="selected-list">
        <div class="chip" *ngFor="let p of selectedProducts">

          {{p.name}}

          <div class="qty">
            <button (click)="decreaseQty(p)">-</button>
            <span>{{p.qty}}</span>
            <button (click)="increaseQty(p)">+</button>
          </div>

          <span class="price">₹{{p.price * p.qty}}</span>

          <i (click)="removeProduct(p)">✕</i>
        </div>
      </div>

    </div>

    <!-- TOTAL -->
    <div class="field full total">
      Total: ₹{{totalAmount}}
    </div>

  </div>

  <div class="footer">
    <button (click)="close()">Cancel</button>
    <button (click)="save()" [disabled]="saving">
      {{saving ? 'Saving...' : 'Save'}}
    </button>
  </div>

</div>

<app-success-dialog
  *ngIf="showSuccess"
  [patient]="savedPatient"
  (close)="showSuccess = false; close()">
</app-success-dialog>
