<div class="overlay"></div>

<div class="dialog">

  <!-- HEADER -->
  <div class="header">
    <h3>Add Patient</h3>
    <span (click)="close()">✕</span>
  </div>

  <!-- BODY -->
  <div class="body grid">

    <!-- MOBILE -->
    <div class="field">
      <label>Mobile *</label>
      <input
        [value]="mobile"
        (input)="onMobileInput($event)"
        maxlength="10"
        placeholder="Enter 10 digit mobile" />

      <div class="error" *ngIf="errors.mobile">
        {{ errors.mobile }}
      </div>

      <div class="hint" *ngIf="existingPatient">
        Existing patient found
      </div>
    </div>

    <!-- NAME -->
    <div class="field">
      <label>Name *</label>
      <input
        [(ngModel)]="name"
        (input)="validateField('name')"
        placeholder="Enter name" />

      <div class="error" *ngIf="errors.name">
        {{ errors.name }}
      </div>
    </div>

    <!-- AGE -->
    <div class="field">
      <label>Age *</label>
      <input
        [value]="age"
        (input)="onAgeInput($event)"
        placeholder="Age" />

      <div class="error" *ngIf="errors.age">
        {{ errors.age }}
      </div>
    </div>

    <!-- GENDER -->
    <div class="field">
      <label>Gender</label>
      <select [(ngModel)]="gender">
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>
    </div>

    <!-- CONCERNS -->
    <div class="field full">
      <label>Concerns</label>
      <input
        [(ngModel)]="concerns"
        placeholder="Patient concerns" />
    </div>

    <!-- REFERRED BY -->
    <div class="field full">
      <label>Referred By</label>
      <input
        [(ngModel)]="referredBy"
        placeholder="Doctor / Friend / Ads" />
    </div>

    <!-- SERVICES -->
    <div class="field full">
      <label>Services</label>

      <!-- SELECT BOX -->
      <div class="select" (click)="openDropdown($event)">

        <!-- SELECTED CHIPS -->
        <div class="chips">
          <span *ngFor="let s of selectedServices">
            {{ s.name }}
            <i (click)="remove(s); $event.stopPropagation()">✕</i>
          </span>
        </div>

        <!-- PLACEHOLDER -->
        <span
          *ngIf="selectedServices.length === 0"
          class="placeholder">
          Search & select services
        </span>

      </div>

      <!-- DROPDOWN -->
      <div
        class="dropdown"
        *ngIf="showDropdown"
        (click)="$event.stopPropagation()">

        <!-- SEARCH -->
        <input
          placeholder="Search services..."
          [(ngModel)]="search"
          (input)="filter()" />

        <!-- OPTIONS -->
        <div
          class="item"
          *ngFor="let s of filteredServices"
          (click)="toggle(s)">

          <input type="checkbox" [checked]="isSelected(s)" />

          <span>{{ s.name }}</span>

          <b>₹{{ s.price || s.finalPrice }}</b>
        </div>

        <!-- EMPTY -->
        <div *ngIf="filteredServices.length === 0" class="item">
          No services found
        </div>

      </div>
    </div>

    <!-- TOTAL BILL -->
    <div class="field full total">
      Total Bill: ₹{{ totalAmount }}
    </div>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    <button (click)="close()">Cancel</button>

    <button (click)="save()" [disabled]="saving">
      {{ saving ? 'Saving...' : 'Save Patient' }}
    </button>
  </div>

</div>

<!-- SUCCESS DIALOG -->
<app-success-dialog
  *ngIf="showSuccess"
  [patient]="savedPatient"
  (close)="showSuccess = false; close()">
</app-success-dialog>
