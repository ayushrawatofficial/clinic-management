<div class="page">
  <div class="page-top">
    <div class="page-chip">Inventory / Products</div>
    <button class="btn btn-primary" (click)="openDialog()">Add Product</button>
  </div>

  <!-- HEADER -->
  <div class="header-bar">

    <div class="kpi-grid kpi-grid--2">
      <div class="kpi-card kpi-blue">
        <div class="kpi-title">Total Products</div>
        <div class="kpi-value">{{ totalProducts }}</div>
      </div>
      <div class="kpi-card kpi-amber">
        <div class="kpi-title">Low Stock</div>
        <div class="kpi-value">{{ lowStock }}</div>
      </div>
    </div>

    <span></span>

  </div>

  <!-- TABLE -->
  <div class="table">

    <!-- HEADER -->
    <div class="row header">
      <div>Name</div>
      <div>Description</div>
      <div>Price</div>
      <div>Stock</div>
      <div>Status</div>
      <div>Actions</div>
    </div>

    <!-- 🔥 FILTER ROW (LIKE SERVICES) -->
    <div class="row filter">
      <div><input [(ngModel)]="filters.name" (input)="applyFilter()" /></div>
      <div><input [(ngModel)]="filters.desc" (input)="applyFilter()" /></div>
      <div><input [(ngModel)]="filters.price" (input)="applyFilter()" /></div>
      <div><input [(ngModel)]="filters.stock" (input)="applyFilter()" /></div>
      <div><select [(ngModel)]="filters.status" (change)="applyFilter()">
        <option value="">All</option>
        <option value="ok">Available</option>
        <option value="low">Low</option>
        <option value="out">Out</option>
      </select></div>
      <div></div>
    </div>

    <!-- DATA -->
      <div class="table-body" (scroll)="onTableScroll($event)">
    <ng-container *ngIf="filtered.length > 0; else noData">

      <div class="row" *ngFor="let p of visibleFiltered">

        <div class="name">{{ p.name }}</div>

        <div class="desc" [title]="p.description">
          {{ p.description || '-' }}
        </div>

        <div>₹{{ p.price }}</div>
        <div>{{ p.stock }}</div>

        <div>
          <span *ngIf="getStatus(p) === 'ok'" class="ok">Available</span>
          <span *ngIf="getStatus(p) === 'low'" class="low">Low</span>
          <span *ngIf="getStatus(p) === 'out'" class="out">Out</span>
        </div>

        <div class="actions">
          <button class="edit" (click)="openDialog(p)">Edit</button>
          <button class="delete" (click)="delete(p)">Delete</button>
        </div>

      </div>

    </ng-container>

    <ng-template #noData>
      <div class="no-data">No products found</div>
    </ng-template>

  </div>
  </div>

  <!-- DIALOG -->
  <app-add-product
    *ngIf="showDialog"
    [product]="selectedProduct"
    (onClose)="closeDialog()">
  </app-add-product>

</div>
