<div class="page">
  <div class="page-top">
    <div class="page-chip">Inventory / Products</div>
    <button class="btn btn-primary" (click)="openDialog()">Add Product</button>
  </div>

  <!-- HEADER -->
  <div class="header-bar">

    <div class="kpi-grid kpi-grid--2">
      <div class="kpi-card kpi-blue">
        <div class="kpi-title">Total Products</div>
        <div class="kpi-value">{{ totalProducts }}</div>
      </div>
      <div class="kpi-card kpi-amber">
        <div class="kpi-title">Low Stock</div>
        <div class="kpi-value">{{ lowStock }}</div>
      </div>
    </div>
  </div>

  <div class="search-bar">
    <input
      [(ngModel)]="search"
      (input)="applyFilter()"
      placeholder="Search name, description, price, stock, status…"
    />
  </div>

  <!-- TABLE -->
  <div class="table">

    <!-- HEADER -->
    <div class="row header">
      <div>Name</div>
      <div>Description</div>
      <div>Price</div>
      <div>Stock</div>
      <div>Status</div>
      <div>Actions</div>
    </div>

    <!-- DATA -->
      <div class="table-body" (scroll)="onTableScroll($event)">
    <ng-container *ngIf="filtered.length > 0; else noData">

      <div class="row" *ngFor="let p of visibleFiltered">

        <div class="name">{{ p.name }}</div>

        <div class="desc" [title]="p.description">
          {{ p.description || '-' }}
        </div>

        <div>₹{{ p.price }}</div>
        <div>{{ p.stock }}</div>

        <div>
          <span
            class="badge"
            [class.badge-ok]="getStatus(p) === 'ok'"
            [class.badge-low]="getStatus(p) === 'low'"
            [class.badge-out]="getStatus(p) === 'out'">
            {{ getStatus(p) === 'ok' ? 'Available' : (getStatus(p) === 'low' ? 'Low' : 'Out') }}
          </span>
        </div>

        <div class="actions">
          <button type="button" class="btn btn-secondary btn-sm" (click)="openDialog(p)">Edit</button>
          <button type="button" class="btn btn-primary btn-sm" (click)="delete(p)">Delete</button>
        </div>

      </div>

    </ng-container>

    <ng-template #noData>
      <div class="no-data">No products found</div>
    </ng-template>

  </div>
  </div>

  <!-- DIALOG -->
  <app-add-product
    *ngIf="showDialog"
    [product]="selectedProduct"
    (onClose)="closeDialog()">
  </app-add-product>

</div>
