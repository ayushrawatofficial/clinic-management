<div class="dialog-root">
  <div class="overlay" (click)="close()"></div>

  <div class="dialog" (click)="$event.stopPropagation()">
    <div class="dlg-head">
      <h2>{{ isEdit ? 'Edit Product' : 'Add Product' }}</h2>
      <button type="button" class="ghost" (click)="close()">✕</button>
    </div>

    <div class="dlg-body">
      <div class="dlg-grid">
        <label class="field">
          Product Name *
          <input
            [(ngModel)]="name"
            placeholder="Product name"
            [class.error-border]="submitted && (!name.trim() || isDuplicate())"
          />
          <div class="error" *ngIf="submitted && !name.trim()">Product name is required</div>
          <div class="error" *ngIf="submitted && isDuplicate()">Product already exists</div>
        </label>

        <label class="field">
          Price *
          <input
            type="number"
            [(ngModel)]="price"
            placeholder="0"
            [class.error-border]="submitted && (!price || price <= 0)"
          />
          <div class="error" *ngIf="submitted && (!price || price <= 0)">Enter valid price</div>
        </label>
      </div>

      <label class="field">
        Description
        <textarea rows="3" [(ngModel)]="description" placeholder="Optional notes…"></textarea>
      </label>

      <div class="dlg-grid">
        <label class="field">
          Stock *
          <input
            type="number"
            [(ngModel)]="stock"
            placeholder="0"
            [class.error-border]="submitted && (stock === null || stock < 0)"
          />
          <div class="error" *ngIf="submitted && (stock === null || stock < 0)">Invalid stock value</div>
        </label>

        <label class="field">
          Low Stock Alert
          <input type="number" [(ngModel)]="lowStock" />
        </label>
      </div>
    </div>

    <div class="dlg-foot">
      <button type="button" class="btn btn-secondary" (click)="close()">Cancel</button>
      <button type="button" class="btn btn-primary" (click)="save()">
        {{ isEdit ? 'Update' : 'Save' }}
      </button>
    </div>
  </div>
</div>
